---
layout: default
---

<article class="knowledge-page">
  <p class="eyebrow">Wiki</p>
  <h1>{{ page.title }}</h1>
  {% if page.summary %}
    <p class="lede">{{ page.summary }}</p>
  {% endif %}
  {% if page.related %}
    <section class="crosslink-panel" aria-label="Related wiki pages">
      <h2>Related Wiki Pages</h2>
      <div class="meta">
      {% for item in page.related %}
        {% assign item_slug = item | slugify %}
        <a href="{{ '/wiki/' | append: item_slug | append: '/' | relative_url }}">{{ item }}</a>
      {% endfor %}
      </div>
    </section>
  {% endif %}
  {{ content }}
</article>
