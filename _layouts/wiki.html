---
layout: default
---

<article class="knowledge-page">
  <p class="eyebrow">Wiki</p>
  <h1>{{ page.title }}</h1>
  {% if page.summary %}
    <p class="lede">{{ page.summary }}</p>
  {% endif %}
  {% if page.related %}
    <div class="meta">
      {% for item in page.related %}
        <a href="/wiki/{{ item | slugify }}/">{{ item }}</a>
      {% endfor %}
    </div>
  {% endif %}
  {{ content }}
</article>
