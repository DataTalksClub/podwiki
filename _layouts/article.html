---
layout: default
---

<article class="knowledge-page article-page">
  <p class="eyebrow">Article</p>
  <h1>{{ page.title }}</h1>
  {% if page.keyword %}
    <p class="muted">Target keyword: {{ page.keyword }}</p>
  {% endif %}
  {% if page.summary %}
    <p class="lede">{{ page.summary }}</p>
  {% endif %}
  {{ content }}
</article>
