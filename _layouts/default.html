<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.summary %}{{ page.summary }}{% else %}{{ site.description }}{% endif %}">
    <link href="https://fonts.googleapis.com/css?family=Alegreya+Sans:300,400,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Raleway:300,400,500,600,700" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
    <script>
      window.PODWIKI_BASE_URL = "{{ site.baseurl }}";
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-container">
        <div class="site-title">
          <a class="brand" href="{{ '/' | relative_url }}">DataTalks.Club</a>
          <span>Podcast Wiki</span>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/graph.html' | relative_url }}">Graph</a>
          <a href="{{ '/wiki/' | relative_url }}">Wiki</a>
          <a href="{{ '/guides/' | relative_url }}">Guides</a>
          <a href="{{ '/comparisons/' | relative_url }}">Comparisons</a>
          <a href="{{ '/roadmaps/' | relative_url }}">Roadmaps</a>
          <a href="{{ '/how-tos/' | relative_url }}">How-Tos</a>
          <a href="{{ '/podcasts/' | relative_url }}">Podcasts</a>
          <a href="{{ '/people/' | relative_url }}">People</a>
          <a href="{{ '/search.html' | relative_url }}">Search</a>
        </nav>
      </div>
    </header>
    <main class="page">
      {{ content }}
    </main>
  </body>
</html>
