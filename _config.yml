url: "https://datatalks.club"
baseurl: ""
name: DataTalks.Club Podcast Wiki
title: DataTalks.Club Podcast Wiki
description: Topic hubs, guides, people pages, and exploration search for the DataTalks.Club podcast archive.
permalink: pretty
search_api_url: "https://2zoro3dw5xu4jk6uo4u3q2dfim0nhdgb.lambda-url.eu-west-1.on.aws/"

exclude:
  - .bin/
  - .git/
  - .github/
  - .rustkyll-manifest.json
  - artifacts/
  - AGENTS.md
  - Makefile
  - README.md
  - scripts/
  - sources/
  - _episodes/
  - _topics/
  - _guests/
  - _people/README.md
  - _podcast_summaries/README.md
  - template.yaml
  - search_lambda/
  - lambda_package/
  - .aws-sam/
  - pyproject.toml
  - requirements.txt
  - wiki/

collections:
  books:
    output: true
    permalink: /books/:title/
  podcast_summaries:
    output: true
    permalink: /podcasts/:title/
  people:
    output: true
    permalink: /people/:title/
  wiki:
    output: true
    permalink: /wiki/:title/

defaults:
  - scope:
      path: ""
      type: "podcast_summaries"
    values:
      layout: "podcast_summary"
  - scope:
      path: ""
      type: "people"
    values:
      layout: "person"
  - scope:
      path: ""
      type: "wiki"
    values:
      layout: "wiki"
  - scope:
      path: ""
      type: "books"
    values:
      layout: "book_summary"
