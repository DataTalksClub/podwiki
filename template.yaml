AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Podwiki Zerosearch Lambda for DataTalks.Club podcast search.

Parameters:
  CorsOrigin:
    Type: String
    Default: "*"
  GitHubRepo:
    Type: String
    Default: "DataTalksClub/podwiki"

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Architectures:
      - arm64

Resources:
  PodcastSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: podwiki-search
      CodeUri: lambda_package
      Handler: search_lambda.podwiki_search.handler.lambda_handler
      Runtime: python3.14
      Environment:
        Variables:
          SEARCH_INDEX_PATH: artifacts/search/search-index.zsx
          CORS_ORIGIN: !Ref CorsOrigin
      FunctionUrlConfig:
        AuthType: NONE

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubRepo}:*"
      Policies:
        - PolicyName: podwiki-search-sam-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationStack
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/podwiki-search/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/aws-sam-cli-managed-default/*"
              - Sid: CloudFormationServerlessTransform
                Effect: Allow
                Action: cloudformation:CreateChangeSet
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31"
              - Sid: CloudFormationTemplateInspection
                Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Sid: SamDeployBucket
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutEncryptionConfiguration
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::aws-sam-cli-managed-default-*
                  - arn:aws:s3:::aws-sam-cli-managed-default-*/*
              - Sid: LambdaFunction
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:ListVersionsByFunction
                  - lambda:PublishVersion
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:ListTags
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:GetPolicy
                  - lambda:CreateFunctionUrlConfig
                  - lambda:UpdateFunctionUrlConfig
                  - lambda:GetFunctionUrlConfig
                  - lambda:DeleteFunctionUrlConfig
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:podwiki-search"
              - Sid: ManageStackRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:UpdateAssumeRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/podwiki-search-*"
              - Sid: PassFunctionRoleToLambda
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/podwiki-search-*"
                Condition:
                  StringEquals:
                    iam:PassedToService: lambda.amazonaws.com

Outputs:
  FunctionUrl:
    Description: Public podcast search endpoint.
    Value: !GetAtt PodcastSearchFunctionUrl.FunctionUrl
  DeployRoleArn:
    Description: Set this as the AWS_DEPLOY_ROLE_ARN GitHub secret.
    Value: !GetAtt GitHubDeployRole.Arn
